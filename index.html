<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⭐ Kids Mission Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;max-width:430px;margin:0 auto;min-height:100vh;overflow-x:hidden;background:#FFF9F0;}

/* FONTS */
body{font-family:'Nunito',sans-serif;}
body.lang-ar{font-family:'Tajawal',sans-serif;direction:rtl;}
body.lang-ar .app-header,
body.lang-ar .auth-card,
body.lang-ar .tracker-card,
body.lang-ar .week-summary,
body.lang-ar .kid-card-settings{direction:rtl;text-align:right;}

/* LANGUAGE PICKER */
.lang-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#FF6B6B22,#4ECDC422);}
.lang-logo{font-size:4rem;margin-bottom:12px;}
.lang-title{font-family:'Fredoka One',cursive;font-size:2.2rem;color:#FF6B6B;margin-bottom:8px;text-align:center;}
.lang-sub{color:#aaa;font-size:1rem;font-weight:700;margin-bottom:36px;text-align:center;}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;}
.lang-btn{padding:20px 16px;border:3px solid #eee;border-radius:20px;background:#fff;cursor:pointer;text-align:center;transition:all .2s;box-shadow:0 4px 12px rgba(0,0,0,.06);}
.lang-btn:active{transform:scale(.97);}
.lang-btn .lang-flag{font-size:2.5rem;display:block;margin-bottom:8px;}
.lang-btn .lang-name{font-size:1.1rem;font-weight:800;color:#333;display:block;}
.lang-btn .lang-native{font-size:.9rem;color:#aaa;font-weight:700;display:block;margin-top:2px;}
.lang-btn.selected{border-color:#FF6B6B;background:#FFF5F5;}

/* AUTH */
.auth-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#FF6B6B22,#4ECDC422);}
.auth-logo{font-size:3.5rem;margin-bottom:8px;}
.auth-title{font-family:'Fredoka One',cursive;font-size:2.2rem;color:#FF6B6B;margin-bottom:6px;text-align:center;}
.auth-sub{color:#aaa;font-size:1rem;font-weight:700;margin-bottom:28px;text-align:center;}
.auth-card{background:#fff;border-radius:24px;padding:24px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.1);}
.auth-tabs{display:flex;margin-bottom:20px;background:#f5f5f5;border-radius:16px;padding:4px;gap:4px;}
.auth-tab{flex:1;padding:12px 8px;border:none;background:none;font-size:1rem;font-weight:800;color:#aaa;cursor:pointer;border-radius:12px;transition:all .2s;}
.auth-tab.active{background:#fff;color:#FF6B6B;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.auth-input{width:100%;padding:14px 16px;border:2.5px solid #eee;border-radius:14px;font-size:1rem;font-weight:700;outline:none;margin-bottom:14px;transition:border-color .2s;background:#fafafa;}
.auth-input:focus{border-color:#FF6B6B;background:#fff;}
.auth-btn{width:100%;padding:16px;border:none;border-radius:16px;background:linear-gradient(135deg,#FF6B6B,#FF8E53);color:#fff;font-size:1.1rem;font-weight:800;cursor:pointer;transition:all .2s;margin-top:4px;letter-spacing:.5px;}
.auth-btn:disabled{opacity:.6;}
.auth-error{color:#FF6B6B;font-size:.9rem;font-weight:800;margin-bottom:12px;text-align:center;min-height:20px;}
.back-lang-btn{margin-top:20px;background:none;border:none;color:#aaa;font-size:.9rem;font-weight:800;cursor:pointer;text-decoration:underline;}

/* LOADING */
.loading-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.spinner{width:48px;height:48px;border:5px solid #eee;border-top-color:#FF6B6B;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-screen p{font-size:1.1rem;font-weight:800;color:#aaa;}

/* APP */
.app-wrap{display:none;}
.app-header{background:linear-gradient(135deg,#FF6B6B,#FF8E53 50%,#4ECDC4);padding:16px;position:relative;overflow:hidden;}
.app-header::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fff' fill-opacity='0.07'%3E%3Cpath d='M20 20.5V18H0v5h20v20.5h5V23h20v-5H25V2.5h-5z'/%3E%3C/g%3E%3C/svg%3E");}
.header-row{display:flex;align-items:center;justify-content:space-between;position:relative;}
.header-title{font-family:'Fredoka One',cursive;font-size:1.6rem;color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.1);}
.header-right{display:flex;align-items:center;gap:8px;}
.user-email{color:rgba(255,255,255,.85);font-size:.75rem;font-weight:800;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.logout-btn{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:.75rem;font-weight:800;padding:6px 12px;border-radius:10px;cursor:pointer;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:2px solid #f0f0f0;display:flex;z-index:50;box-shadow:0 -4px 20px rgba(0,0,0,.08);}
.nav-btn{flex:1;padding:12px 4px 10px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:.7rem;font-weight:800;color:#bbb;transition:color .2s;}
.nav-btn.active{color:#FF6B6B;}
.nav-icon{font-size:1.5rem;}

/* PAGES */
.page{display:none;padding-bottom:90px;}
.page.active{display:block;}

/* KIDS TABS */
.kids-tabs{display:flex;gap:0;overflow-x:auto;padding:14px 12px 0;scrollbar-width:none;}
.kids-tabs::-webkit-scrollbar{display:none;}
.kid-tab{flex-shrink:0;padding:12px 16px;border:none;border-radius:16px 16px 0 0;font-size:.95rem;font-weight:800;cursor:pointer;transition:all .2s;background:#f0f0f0;color:#999;display:flex;align-items:center;gap:8px;}
.kid-tab.active{color:#fff;transform:translateY(-3px);box-shadow:0 -4px 12px rgba(0,0,0,.12);}
.add-kid-tab{flex-shrink:0;padding:12px 16px;border:2.5px dashed #ddd;border-radius:16px 16px 0 0;background:none;cursor:pointer;font-size:1.3rem;color:#ccc;}

/* TRACKER CARD */
.tracker-card{margin:0 12px;border-radius:0 0 22px 22px;padding:16px;box-shadow:0 6px 24px rgba(0,0,0,.1);}
.week-bar{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
.week-bar::-webkit-scrollbar{display:none;}
.week-btn{flex-shrink:0;padding:8px 14px;border-radius:20px;border:none;font-size:.85rem;font-weight:800;cursor:pointer;background:#f0f0f0;color:#999;transition:all .2s;white-space:nowrap;}

/* DAY ACCORDION */
.day-block{margin-bottom:10px;border-radius:16px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.07);}
.day-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;background:#fff;}
.day-badge{font-size:.85rem;font-weight:800;color:#fff;padding:4px 14px;border-radius:14px;}
.day-score{font-size:.85rem;font-weight:800;color:#aaa;}
.day-arrow{font-size:.8rem;color:#ccc;transition:transform .2s;}
.day-block.open .day-arrow{transform:rotate(180deg);}
.day-tasks{display:none;background:#fafafa;}
.day-block.open .day-tasks{display:block;}
.task-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #f0f0f0;cursor:pointer;user-select:none;transition:background .15s;}
.task-row:last-child{border-bottom:none;}
.task-row.done{background:#fefefe;}
.t-icon{font-size:1.5rem;min-width:32px;text-align:center;}
.t-name{flex:1;font-size:1rem;font-weight:700;color:#333;}
.task-row.done .t-name{text-decoration:line-through;color:#ccc;}
.check-box{width:30px;height:30px;border-radius:50%;border:3px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;transition:all .2s;}
.check-box.on{color:#fff;}

/* SUMMARY */
.week-summary{background:#fff;border-radius:20px;padding:18px;margin:14px 12px 0;box-shadow:0 4px 16px rgba(0,0,0,.07);}
.sum-title{font-size:1.1rem;font-weight:800;margin-bottom:14px;}
.day-chips{display:flex;gap:5px;margin-bottom:14px;}
.d-chip{flex:1;text-align:center;padding:8px 2px;border-radius:12px;background:#f5f5f5;}
.d-chip .cs{font-size:1rem;font-weight:800;display:block;}
.d-chip .cl{font-size:.6rem;color:#aaa;font-weight:800;}
.prog-label{display:flex;justify-content:space-between;font-size:.85rem;font-weight:800;color:#777;margin-bottom:6px;}
.prog-bar{height:16px;border-radius:20px;background:#f0f0f0;overflow:hidden;}
.prog-fill{height:100%;border-radius:20px;transition:width .6s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden;}
.prog-fill::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);animation:sh 2s infinite;}
@keyframes sh{to{left:200%;}}
.stars-row{display:flex;gap:4px;justify-content:center;margin-top:12px;}
.s-icon{font-size:1.4rem;}
.s-empty{filter:grayscale(1) opacity(.25);}
.achieve{text-align:center;padding:12px;border-radius:16px;margin-top:12px;font-size:.95rem;font-weight:800;display:none;border:2.5px dashed;}
.achieve.show{display:block;animation:pop .4s ease;}
@keyframes pop{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}

/* SETTINGS */
.settings-header{padding:18px 16px;font-size:1.3rem;font-weight:800;color:#444;}
.kids-list{padding:0 12px;}
.kid-card-settings{background:#fff;border-radius:20px;padding:18px;margin-bottom:14px;box-shadow:0 3px 14px rgba(0,0,0,.08);}
.kcs-top{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.kid-avatar-big{font-size:2.6rem;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.kid-name-input{font-size:1.05rem;font-weight:800;border:2.5px solid #eee;border-radius:12px;padding:8px 12px;width:100%;outline:none;color:#333;background:#fafafa;}
.kid-name-input:focus{border-color:#FF6B6B;background:#fff;}
.section-label{font-size:.75rem;font-weight:800;color:#aaa;letter-spacing:1px;margin-bottom:10px;text-transform:uppercase;}
.color-picker{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.color-dot{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .2s;}
.color-dot.sel{border-color:#333;transform:scale(1.2);}
.animal-picker{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.animal-btn{font-size:1.6rem;width:46px;height:46px;border-radius:14px;border:2.5px solid transparent;background:#f5f5f5;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.animal-btn.sel{border-color:#FF6B6B;background:#FFE5E5;transform:scale(1.15);}
.task-edit-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.task-icon-pick{font-size:1.3rem;width:44px;height:44px;border-radius:12px;border:2.5px solid #eee;background:#fafafa;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.task-name-inp{flex:1;padding:10px 12px;border:2.5px solid #eee;border-radius:12px;font-size:.95rem;font-weight:700;outline:none;background:#fafafa;}
.task-name-inp:focus{border-color:#FF6B6B;background:#fff;}
.del-task-btn{width:34px;height:34px;border-radius:50%;border:none;background:#FFE5E5;color:#FF6B6B;font-size:1.1rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.add-task-btn{width:100%;padding:12px;border:2.5px dashed #ddd;border-radius:14px;background:none;font-size:1rem;font-weight:800;color:#aaa;cursor:pointer;margin-top:6px;}
.del-kid-btn{width:100%;padding:12px;border:2.5px solid #FFE5E5;border-radius:14px;background:none;font-size:.95rem;font-weight:800;color:#FF6B6B;cursor:pointer;margin-top:10px;}
.add-kid-big-btn{display:block;width:calc(100% - 24px);margin:0 12px 14px;padding:16px;border:2.5px dashed #ddd;border-radius:20px;background:none;font-size:1.05rem;font-weight:800;color:#aaa;cursor:pointer;text-align:center;}
.save-settings-btn{display:block;width:calc(100% - 24px);margin:0 12px 16px;padding:16px;border:none;border-radius:20px;background:linear-gradient(135deg,#FF6B6B,#FF8E53);color:#fff;font-size:1.05rem;font-weight:800;cursor:pointer;text-align:center;}

/* EMOJI MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-end;justify-content:center;z-index:200;}
.modal-bg.open{display:flex;}
.emoji-modal{background:#fff;border-radius:26px 26px 0 0;padding:22px;width:100%;max-width:430px;max-height:70vh;overflow-y:auto;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.emoji-modal h3{font-size:1.2rem;font-weight:800;margin-bottom:16px;}
.emoji-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
.e-btn{font-size:1.6rem;width:44px;height:44px;border-radius:12px;border:none;background:#f5f5f5;cursor:pointer;}
.modal-close{width:100%;padding:14px;border:none;border-radius:16px;background:#f0f0f0;font-size:1rem;font-weight:800;color:#666;cursor:pointer;margin-top:14px;}

/* TOAST */
.save-toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:24px;font-size:.9rem;font-weight:800;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.save-toast.show{opacity:1;}

/* CONFETTI */
.confetti-p{position:fixed;width:10px;height:10px;top:-20px;animation:cf 1.4s ease-in forwards;border-radius:2px;z-index:999;pointer-events:none;}
@keyframes cf{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-screen" id="loading-screen">
  <div class="spinner"></div>
  <p id="loading-text">Loading...</p>
</div>

<!-- LANGUAGE PICKER -->
<div class="lang-screen" id="lang-screen" style="display:none;">
  <div class="lang-logo">⭐</div>
  <div class="lang-title">Mission Tracker</div>
  <div class="lang-sub">Choose your language / Choisissez votre langue</div>
  <div class="lang-grid">
    <button class="lang-btn" onclick="setLang('en')">
      <span class="lang-flag">🇬🇧</span>
      <span class="lang-name">English</span>
      <span class="lang-native">English</span>
    </button>
    <button class="lang-btn" onclick="setLang('fr')">
      <span class="lang-flag">🇫🇷</span>
      <span class="lang-name">Français</span>
      <span class="lang-native">French</span>
    </button>
    <button class="lang-btn" onclick="setLang('ar')">
      <span class="lang-flag">🇩🇿</span>
      <span class="lang-name">العربية</span>
      <span class="lang-native">Arabic</span>
    </button>
    <button class="lang-btn" onclick="setLang('de')">
      <span class="lang-flag">🇩🇪</span>
      <span class="lang-name">Deutsch</span>
      <span class="lang-native">German</span>
    </button>
  </div>
</div>

<!-- AUTH -->
<div class="auth-screen" id="auth-screen" style="display:none;">
  <div class="auth-logo">⭐</div>
  <div class="auth-title" id="auth-title">Mission Tracker</div>
  <div class="auth-sub" id="auth-sub">Your kids' habit tracker</div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Login</button>
      <button class="auth-tab" id="tab-signup" onclick="switchAuthTab('signup')">Sign Up</button>
    </div>
    <div class="auth-error" id="auth-error"></div>
    <input class="auth-input" id="auth-email" type="email" placeholder="Email">
    <input class="auth-input" id="auth-password" type="password" placeholder="Password">
    <button class="auth-btn" id="auth-submit-btn" onclick="handleAuth()">Login</button>
  </div>
  <button class="back-lang-btn" onclick="goBackToLang()">🌍 Change language</button>
</div>

<!-- MAIN APP -->
<div class="app-wrap" id="app-wrap">
  <div class="app-header">
    <div class="header-row">
      <div class="header-title">⭐ <span id="app-title-text">Mission Tracker</span></div>
      <div class="header-right">
        <span class="user-email" id="user-email-display"></span>
        <button class="logout-btn" id="logout-btn" onclick="handleLogout()">Logout</button>
      </div>
    </div>
  </div>
  <div class="page active" id="page-tracker">
    <div class="kids-tabs" id="kids-tabs"></div>
    <div id="tracker-card-wrap"></div>
    <div id="week-summary-wrap"></div>
  </div>
  <div class="page" id="page-settings">
    <div class="settings-header" id="settings-header-text">⚙️ Customize</div>
    <div class="kids-list" id="settings-kids-list"></div>
    <button class="add-kid-big-btn" id="add-kid-btn" onclick="addKid()">➕ Add Child</button>
    <button class="save-settings-btn" id="save-cloud-btn" onclick="saveToCloud()">☁️ Save to Cloud</button>
  </div>
  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-tracker" onclick="showPage('tracker')">
      <span class="nav-icon">📋</span>
      <span id="nav-tracker-label">Tracker</span>
    </button>
    <button class="nav-btn" id="nav-settings" onclick="showPage('settings')">
      <span class="nav-icon">⚙️</span>
      <span id="nav-settings-label">Customize</span>
    </button>
  </div>
</div>

<!-- EMOJI MODAL -->
<div class="modal-bg" id="emoji-modal-bg">
  <div class="emoji-modal">
    <h3 id="emoji-modal-title">Pick an Emoji</h3>
    <div class="emoji-grid" id="emoji-grid"></div>
    <button class="modal-close" id="emoji-close-btn" onclick="closeEmojiModal()">Close</button>
  </div>
</div>

<div class="save-toast" id="save-toast">✅ Saved!</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAafkiRvudiyg9_BHH_dHan3zSkZtNJmz0",
  authDomain: "kids-tracker-ee287.firebaseapp.com",
  projectId: "kids-tracker-ee287",
  storageBucket: "kids-tracker-ee287.firebasestorage.app",
  messagingSenderId: "677673433845",
  appId: "1:677673433845:web:1edc57866921c6d278a3bc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window._auth = auth;
window._db = db;
window._createUser = createUserWithEmailAndPassword;
window._signIn = signInWithEmailAndPassword;
window._signOut = signOut;
window._getDoc = getDoc;
window._setDoc = setDoc;
window._doc = doc;

onAuthStateChanged(auth, async (user) => {
  if (user) {
    window.currentUser = user;
    document.getElementById('user-email-display').textContent = user.email;
    await loadFromCloud(user.uid);
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('lang-screen').style.display = 'none';
    document.getElementById('app-wrap').style.display = 'block';
    applyLangToApp();
    renderTracker();
  } else {
    window.currentUser = null;
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('app-wrap').style.display = 'none';
    const savedLang = localStorage.getItem('mtracker-lang');
    if (savedLang) {
      currentLang = savedLang;
      applyBodyLang();
      showAuth();
    } else {
      document.getElementById('lang-screen').style.display = 'flex';
    }
  }
});

async function loadFromCloud(uid) {
  try {
    const ref = window._doc(window._db, 'users', uid);
    const snap = await window._getDoc(ref);
    if (snap.exists()) {
      const data = snap.data();
      state.kids = data.kids || defaultKids();
      state.checks = data.checks || {};
      state.currentWeek = data.currentWeek || {};
      if (data.lang) currentLang = data.lang;
      fixState();
    } else {
      state.kids = defaultKids();
      state.checks = {};
      state.currentWeek = {};
      fixState();
      await saveToCloud();
    }
  } catch(e) {
    state.kids = defaultKids();
    fixState();
  }
}
window.loadFromCloud = loadFromCloud;
</script>

    customize: 'Customize',

function t(key) { return T[currentLang][key] || T['en'][key]; }

function defaultKids() {
  const lang = T[currentLang];
  return [
    {id:'k0',name:lang.kid1Name,animal:'🦁',colorIdx:0,tasks:JSON.parse(JSON.stringify(lang.tasks))},
    {id:'k1',name:lang.kid2Name,animal:'🐬',colorIdx:1,tasks:JSON.parse(JSON.stringify(lang.tasks))},
  ];
}

function fixState() {
  state.kids.forEach(kid => {
    if(!state.checks[kid.id]) state.checks[kid.id]={};
    if(!state.currentWeek[kid.id]) state.currentWeek[kid.id]=1;
    for(let w=1;w<=WEEKS;w++){
      if(!state.checks[kid.id][w]) state.checks[kid.id][w]={};
      for(let d=0;d<7;d++){
        const need=kid.tasks.length;
        if(!state.checks[kid.id][w][d]) state.checks[kid.id][w][d]=new Array(need).fill(false);
        while(state.checks[kid.id][w][d].length<need) state.checks[kid.id][w][d].push(false);
      }
    }
  });
  if(!state.kids[state.currentKid]) state.currentKid=0;
}

// ── LANG ──
function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('mtracker-lang', lang);
  applyBodyLang();
  showAuth();
}
window.setLang = setLang;

function applyBodyLang() {
  document.body.className = 'lang-'+currentLang;
  if(currentLang==='ar') document.documentElement.setAttribute('dir','rtl');
  else document.documentElement.setAttribute('dir','ltr');
}

function applyLangToApp() {
  applyBodyLang();
  document.getElementById('loading-text').textContent = t('loading');
  document.getElementById('logout-btn').textContent = t('logout');
  document.getElementById('nav-tracker-label').textContent = t('tracker');

}

function showAuth() {

// ── AUTH ──
function switchAuthTab(mode) {
  authMode = mode;
  document.getElementById('tab-login').classList.toggle('active', mode==='login');
  document.getElementById('tab-signup').classList.toggle('active', mode==='signup');
  document.getElementById('auth-submit-btn').textContent = mode==='login'?t('loginBtn'):t('signupBtn');
  document.getElementById('auth-error').textContent='';
}
window.switchAuthTab = switchAuthTab;

async function handleAuth() {
  const email=document.getElementById('auth-email').value.trim();
  const password=document.getElementById('auth-password').value;
  const errEl=document.getElementById('auth-error');
  const btn=document.getElementById('auth-submit-btn');
  if(!email||!password){errEl.textContent=t('fillFields');return;}
  btn.disabled=true;btn.textContent='...';
  try {
    if(authMode==='signup') await window._createUser(window._auth,email,password);
    else await window._signIn(window._auth,email,password);
    errEl.textContent='';
  } catch(e) {
    errEl.textContent=e.message.replace('Firebase: ','').replace(/\(.*\)/,'');
    btn.disabled=false;
    btn.textContent=authMode==='login'?t('loginBtn'):t('signupBtn');
  }
}
window.handleAuth = handleAuth;

async function handleLogout() {
  await window._signOut(window._auth);
  localStorage.removeItem('mtracker-lang');
}
window.handleLogout = handleLogout;

// ── CLOUD ──
async function saveToCloud() {
  if(!window.currentUser)return;
  try {
    const ref=window._doc(window._db,'users',window.currentUser.uid);
    await window._setDoc(ref,{kids:state.kids,checks:state.checks,currentWeek:state.currentWeek,lang:currentLang});
    showToast(t('savedCloud'));
  } catch(e){showToast(t('saveFailed'));}
}
window.saveToCloud = saveToCloud;

async function quickSave() {
  if(!window.currentUser)return;
  try {
    const ref=window._doc(window._db,'users',window.currentUser.uid);
    await window._setDoc(ref,{kids:state.kids,checks:state.checks,currentWeek:state.currentWeek,lang:currentLang});
  } catch(e){console.error(e);}
}

function showToast(msg) {
  const t=document.getElementById('save-toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ── PAGE NAV ──
function showPage(p) {
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('nav-'+p).classList.add('active');
  if(p==='settings') renderSettings();
  if(p==='tracker') renderTracker();
}
window.showPage = showPage;

// ── TRACKER ──
function renderTracker(){renderKidTabs();renderTrackerCard();renderWeekSummary();}

function renderKidTabs() {
  const wrap=document.getElementById('kids-tabs');
  wrap.innerHTML='';
  state.kids.forEach((kid,i)=>{
    const col=PALETTE[kid.colorIdx||0];
    const btn=document.createElement('button');
    btn.className='kid-tab'+(i===state.currentKid?' active':'');
    btn.style.background=i===state.currentKid?col.main:'#f0f0f0';
    btn.innerHTML=`<span>${kid.animal}</span><span>${kid.name}</span>`;
    btn.onclick=()=>{state.currentKid=i;renderTracker();};
    wrap.appendChild(btn);
  });
  const add=document.createElement('button');
  add.className='add-kid-tab';add.textContent='➕';
  add.onclick=()=>{addKid();showPage('settings');};
  wrap.appendChild(add);
}

function renderTrackerCard() {
  const kid=state.kids[state.currentKid];
  if(!kid)return;
  const col=PALETTE[kid.colorIdx||0];
  const w=state.currentWeek[kid.id]||1;
  const days=t('days');
  const wrap=document.getElementById('tracker-card-wrap');
  wrap.innerHTML='';
  const card=document.createElement('div');
  card.className='tracker-card';
  card.style.background=`linear-gradient(160deg,${col.light} 0%,#fff 60%)`;
  card.style.borderTop=`4px solid ${col.main}`;

  const wb=document.createElement('div');wb.className='week-bar';
  for(let wk=1;wk<=WEEKS;wk++){
    const b=document.createElement('button');
    b.className='week-btn';
    b.style.background=w===wk?col.main:'#f0f0f0';
    b.style.color=w===wk?'#fff':'#999';
    b.textContent=t('week')+' '+wk;
    b.onclick=()=>{state.currentWeek[kid.id]=wk;renderTracker();quickSave();};
    wb.appendChild(b);
  }
  card.appendChild(wb);

  days.forEach((day,d)=>{
    const checks=state.checks[kid.id][w][d];
    const done=checks.filter(Boolean).length;
    const total=kid.tasks.length;
    const key=kid.id+'_'+w+'_'+d;
    const todayIdx=(new Date().getDay()+6)%7;
    const isOpen=openDays[key]!==undefined?openDays[key]:d===todayIdx;
    const block=document.createElement('div');
    block.className='day-block'+(isOpen?' open':'');
    const header=document.createElement('div');
    header.className='day-header';
    header.innerHTML=`
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="day-badge" style="background:${col.main}">${day}</span>
        <span class="day-score">${done}/${total} ${done===total&&total>0?'⭐':''}</span>
      </div>
      <span class="day-arrow">▼</span>`;
    header.onclick=()=>{openDays[key]=!block.classList.contains('open');block.classList.toggle('open');};
    block.appendChild(header);
    const td=document.createElement('div');td.className='day-tasks';
    kid.tasks.forEach((task,t2)=>{
      const isDone=checks[t2];
      const row=document.createElement('div');
      row.className='task-row'+(isDone?' done':'');
      row.innerHTML=`
        <span class="t-icon">${task.icon}</span>
        <span class="t-name">${task.name}</span>
        <div class="check-box ${isDone?'on':''}" style="${isDone?`background:${col.main};border-color:${col.main}`:''}">
          ${isDone?'✓':''}
        </div>`;
      row.onclick=()=>toggleTask(d,t2);
      td.appendChild(row);
    });
    block.appendChild(td);
    card.appendChild(block);
  });
  wrap.appendChild(card);
}

function renderWeekSummary() {
  const kid=state.kids[state.currentKid];
  if(!kid)return;
  const col=PALETTE[kid.colorIdx||0];
  const w=state.currentWeek[kid.id]||1;
  const days=t('days');
  const wrap=document.getElementById('week-summary-wrap');
  wrap.innerHTML='';
  const box=document.createElement('div');box.className='week-summary';
  let totalDone=0,totalMax=0;
  const fullDays=[];
  const chips=document.createElement('div');chips.className='day-chips';
  days.forEach((day,d)=>{
    const checks=state.checks[kid.id][w][d];
    const done=checks.filter(Boolean).length;
    const total=kid.tasks.length;
    totalDone+=done;totalMax+=total;
    const full=done===total&&total>0;
    fullDays.push(full);
    const chip=document.createElement('div');
    chip.className='d-chip';
    chip.style.background=full?col.light:'#f5f5f5';
    chip.innerHTML=`<span class="cs" style="color:${full?col.dark:'#aaa'}">${full?'⭐':done}</span><span class="cl">${day}</span>`;
    chips.appendChild(chip);
  });
  const pct=totalMax>0?Math.round((totalDone/totalMax)*100):0;
  const earned=fullDays.filter(Boolean).length;
  box.innerHTML=`<div class="sum-title">${t('weekProgress')} ${w}</div>`;
  box.appendChild(chips);
  box.innerHTML+=`
    <div class="prog-label"><span>${t('totalProgress')}</span><span>${totalDone}/${totalMax} (${pct}%)</span></div>
    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:linear-gradient(90deg,${col.grad})"></div></div>
    <div class="stars-row">${Array.from({length:7},(_,i)=>`<span class="s-icon ${fullDays[i]?'':'s-empty'}">⭐</span>`).join('')}</div>`;
  if(earned>=3){
    const msg=earned===7?t('perfectWeek'):earned>=5?`${t('amazing')} ${earned}/7 ${t('perfectDays')}`:`${t('great')} ${earned}/7 ${t('perfectDays')}`;
    const ach=document.createElement('div');
    ach.className='achieve show';
    ach.style.cssText=`background:${col.light};color:${col.dark};border-color:${col.main}`;
    ach.textContent=msg;
    box.appendChild(ach);
  }
  wrap.appendChild(box);
}

async function toggleTask(d,t2) {
  const kid=state.kids[state.currentKid];
  const w=state.currentWeek[kid.id]||1;
  const val=!state.checks[kid.id][w][d][t2];
  state.checks[kid.id][w][d][t2]=val;
  if(val) spawnConfetti(kid.colorIdx||0);
  renderTrackerCard();renderWeekSummary();
  await quickSave();
}

    list.appendChild(card);
    const cp=card.querySelector('#cp-'+i);
    PALETTE.forEach((p,ci)=>{
      const dot=document.createElement('div');
      dot.className='color-dot'+(kid.colorIdx===ci?' sel':'');
      dot.style.background=p.main;
      dot.onclick=()=>{state.kids[i].colorIdx=ci;renderSettings();};
      cp.appendChild(dot);
    });
    const ap=card.querySelector('#ap-'+i);
    ANIMALS.forEach(a=>{
      const btn=document.createElement('button');
      btn.className='animal-btn'+(kid.animal===a?' sel':'');
      btn.textContent=a;
      btn.onclick=()=>{state.kids[i].animal=a;renderSettings();};
      ap.appendChild(btn);
    });
    const te=card.querySelector('#te-'+i);
    kid.tasks.forEach((task,t2)=>{
      const row=document.createElement('div');
      row.className='task-edit-row';
      row.innerHTML=`
        <div class="task-icon-pick" onclick="openEmojiModal(${i},${t2})">${task.icon}</div>
        <input class="task-name-inp" value="${task.name}" placeholder="Task"
          onchange="state.kids[${i}].tasks[${t2}].name=this.value">
        <button class="del-task-btn" onclick="deleteTask(${i},${t2})">✕</button>`;
      te.appendChild(row);
    });
  });
}

function addKid(){
  const id='k'+Date.now();
  const used=state.kids.map(k=>k.colorIdx||0);
  let colorIdx=0;
  for(let c=0;c<PALETTE.length;c++){if(!used.includes(c)){colorIdx=c;break;}}
  const lang=T[currentLang];
  state.kids.push({id,name:'Child '+(state.kids.length+1),animal:ANIMALS[Math.floor(Math.random()*ANIMALS.length)],colorIdx,tasks:JSON.parse(JSON.stringify(lang.tasks))});
  fixState();renderSettings();
}
window.addKid=addKid;

function deleteKid(i){
  if(state.kids.length<=1)return;
  if(!confirm(t('removeKid')+' '+state.kids[i].name+'?'))return;
  state.kids.splice(i,1);
  if(state.currentKid>=state.kids.length)state.currentKid=0;
  renderSettings();
}
window.deleteKid=deleteKid;

function addTask(kidIdx){
  state.kids[kidIdx].tasks.push({icon:'⭐',name:'New Task'});
  fixState();renderSettings();
}
window.addTask=addTask;

function deleteTask(kidIdx,taskIdx){
  if(state.kids[kidIdx].tasks.length<=1)return;
  state.kids[kidIdx].tasks.splice(taskIdx,1);
  fixState();renderSettings();
}
window.deleteTask=deleteTask;

function openEmojiModal(kidIdx,taskIdx){
  emojiCallback=(emoji)=>{state.kids[kidIdx].tasks[taskIdx].icon=emoji;renderSettings();};
  const grid=document.getElementById('emoji-grid');
  grid.innerHTML='';
  ALL_EMOJIS.forEach(em=>{
    const btn=document.createElement('button');
    btn.className='e-btn';btn.textContent=em;
    btn.onclick=()=>{emojiCallback(em);closeEmojiModal();};
    grid.appendChild(btn);
  });
  document.getElementById('emoji-modal-bg').classList.add('open');
}
window.openEmojiModal=openEmojiModal;

function closeEmojiModal(){document.getElementById('emoji-modal-bg').classList.remove('open');}
window.closeEmojiModal=closeEmojiModal;

function spawnConfetti(colorIdx){
  const col=PALETTE[colorIdx||0];
  const colors=[col.main,col.dark,'#FFD700','#fff'];
  for(let i=0;i<16;i++){
    const c=document.createElement('div');
    c.className='confetti-p';
    c.style.left=(Math.random()*100)+'vw';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration=(.7+Math.random()*.8)+'s';
    c.style.animationDelay=(Math.random()*.3)+'s';
    c.style.borderRadius=Math.random()>.5?'50%':'2px';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),1600);
  }
}
</script>
</body>
