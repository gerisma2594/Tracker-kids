<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⭐ Kids Mission Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;max-width:430px;margin:0 auto;min-height:100vh;overflow-x:hidden;background:#FFF9F0;}
body{font-family:'Nunito',sans-serif;}
body.lang-ar{font-family:'Tajawal',sans-serif;}
body.lang-ar .tracker-card,
body.lang-ar .week-summary,
body.lang-ar .kid-card-settings,
body.lang-ar .auth-card,
body.lang-ar .day-header,
body.lang-ar .task-row{direction:rtl;}

/* LANGUAGE SCREEN */
.lang-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#FF6B6B22,#4ECDC422);}
.lang-logo{font-size:4rem;margin-bottom:12px;}
.lang-title{font-family:'Fredoka One',cursive;font-size:2.2rem;color:#FF6B6B;margin-bottom:8px;text-align:center;}
.lang-sub{color:#aaa;font-size:1rem;font-weight:700;margin-bottom:36px;text-align:center;}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;}
.lang-btn{padding:20px 16px;border:3px solid #eee;border-radius:20px;background:#fff;cursor:pointer;text-align:center;transition:all .2s;box-shadow:0 4px 12px rgba(0,0,0,.06);}
.lang-btn:active{transform:scale(.97);}
.lang-flag{font-size:2.5rem;display:block;margin-bottom:8px;}
.lang-name{font-size:1.1rem;font-weight:800;color:#333;display:block;}
.lang-native{font-size:.9rem;color:#aaa;font-weight:700;display:block;margin-top:2px;}

/* AUTH */
.auth-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#FF6B6B22,#4ECDC422);}
.auth-logo{font-size:3.5rem;margin-bottom:8px;}
.auth-title{font-family:'Fredoka One',cursive;font-size:2.2rem;color:#FF6B6B;margin-bottom:6px;text-align:center;}
.auth-sub{color:#aaa;font-size:1rem;font-weight:700;margin-bottom:28px;text-align:center;}
.auth-card{background:#fff;border-radius:24px;padding:24px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.1);}
.auth-tabs{display:flex;margin-bottom:20px;background:#f5f5f5;border-radius:16px;padding:4px;gap:4px;}
.auth-tab{flex:1;padding:12px 8px;border:none;background:none;font-size:1rem;font-weight:800;color:#aaa;cursor:pointer;border-radius:12px;transition:all .2s;}
.auth-tab.active{background:#fff;color:#FF6B6B;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.auth-input{width:100%;padding:14px 16px;border:2.5px solid #eee;border-radius:14px;font-size:1rem;font-weight:700;outline:none;margin-bottom:14px;transition:border-color .2s;background:#fafafa;}
.auth-input:focus{border-color:#FF6B6B;background:#fff;}
.auth-btn{width:100%;padding:16px;border:none;border-radius:16px;background:linear-gradient(135deg,#FF6B6B,#FF8E53);color:#fff;font-size:1.1rem;font-weight:800;cursor:pointer;margin-top:4px;}
.auth-btn:disabled{opacity:.6;}
.auth-error{color:#FF6B6B;font-size:.9rem;font-weight:800;margin-bottom:12px;text-align:center;min-height:20px;}
.back-lang-btn{margin-top:20px;background:none;border:none;color:#aaa;font-size:.9rem;font-weight:800;cursor:pointer;text-decoration:underline;}

/* LOADING */
.loading-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.spinner{width:48px;height:48px;border:5px solid #eee;border-top-color:#FF6B6B;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-screen p{font-size:1.1rem;font-weight:800;color:#aaa;}

/* APP */
.app-wrap{display:none;}
.app-header{background:linear-gradient(135deg,#FF6B6B,#FF8E53 50%,#4ECDC4);padding:14px 16px 16px;position:relative;overflow:hidden;}
.app-header::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fff' fill-opacity='0.07'%3E%3Cpath d='M20 20.5V18H0v5h20v20.5h5V23h20v-5H25V2.5h-5z'/%3E%3C/g%3E%3C/svg%3E");}
.header-row{display:flex;align-items:center;justify-content:space-between;position:relative;}
.header-title{font-family:'Fredoka One',cursive;font-size:1.5rem;color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.1);}
.header-right{display:flex;align-items:center;gap:8px;}
.user-email{color:rgba(255,255,255,.85);font-size:.7rem;font-weight:800;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.logout-btn{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:.72rem;font-weight:800;padding:6px 10px;border-radius:10px;cursor:pointer;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:2px solid #f0f0f0;display:flex;z-index:50;box-shadow:0 -4px 20px rgba(0,0,0,.08);}
.nav-btn{flex:1;padding:10px 4px 8px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:.68rem;font-weight:800;color:#bbb;transition:color .2s;}
.nav-btn.active{color:#FF6B6B;}
.nav-icon{font-size:1.4rem;}

.page{display:none;padding-bottom:90px;}
.page.active{display:block;}

/* KIDS TABS */
.kids-tabs{display:flex;gap:0;overflow-x:auto;padding:12px 12px 0;scrollbar-width:none;}
.kids-tabs::-webkit-scrollbar{display:none;}
.kid-tab{flex-shrink:0;padding:10px 14px;border:none;border-radius:14px 14px 0 0;font-size:.9rem;font-weight:800;cursor:pointer;background:#f0f0f0;color:#999;display:flex;align-items:center;gap:6px;transition:all .2s;}
.kid-tab.active{color:#fff;transform:translateY(-2px);box-shadow:0 -3px 10px rgba(0,0,0,.1);}
.add-kid-tab{flex-shrink:0;padding:10px 14px;border:2.5px dashed #ddd;border-radius:14px 14px 0 0;background:none;cursor:pointer;font-size:1.2rem;color:#ccc;}

/* TRACKER CARD */
.tracker-card{margin:0 12px;border-radius:0 0 20px 20px;padding:14px;box-shadow:0 6px 24px rgba(0,0,0,.1);}

/* MONTH SELECTOR */
.month-selector{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;background:#fff;border-radius:14px;padding:10px 14px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.month-nav-btn{width:36px;height:36px;border-radius:50%;border:none;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;background:#f5f5f5;color:#666;}
.month-nav-btn:active{transform:scale(.9);}
.month-year-display{text-align:center;flex:1;}
.month-name{font-family:'Fredoka One',cursive;font-size:1.2rem;display:block;}
.year-name{font-size:.8rem;font-weight:800;color:#aaa;display:block;}

/* MONTH GRID PICKER */
.month-grid-wrap{display:none;background:#fff;border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 4px 16px rgba(0,0,0,.1);}
.month-grid-wrap.open{display:block;}
.month-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.month-chip{padding:10px 6px;border-radius:12px;border:2.5px solid transparent;background:#f5f5f5;font-size:.85rem;font-weight:800;cursor:pointer;text-align:center;transition:all .2s;}
.month-chip.sel{color:#fff;}
.month-chip:active{transform:scale(.95);}
.year-selector{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:12px;}
.year-btn{width:32px;height:32px;border-radius:50%;border:none;background:#f5f5f5;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.year-display{font-family:'Fredoka One',cursive;font-size:1.1rem;color:#444;}

/* WEEK BAR */
.week-bar{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
.week-bar::-webkit-scrollbar{display:none;}
.week-btn{flex-shrink:0;padding:7px 12px;border-radius:18px;border:none;font-size:.8rem;font-weight:800;cursor:pointer;background:#f0f0f0;color:#999;transition:all .2s;white-space:nowrap;text-align:center;}
.week-btn .week-dates{display:block;font-size:.65rem;font-weight:700;opacity:.8;margin-top:2px;}

/* DAY ACCORDION */
.day-block{margin-bottom:8px;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.day-header{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;background:#fff;}
.day-left{display:flex;align-items:center;gap:8px;}
.day-badge{font-size:.8rem;font-weight:800;color:#fff;padding:4px 12px;border-radius:12px;}
.day-date-num{font-size:1rem;font-weight:800;color:#aaa;}
.day-score{font-size:.8rem;font-weight:800;color:#aaa;}
.day-arrow{font-size:.75rem;color:#ccc;transition:transform .2s;}
.day-block.open .day-arrow{transform:rotate(180deg);}
.day-tasks{display:none;background:#fafafa;}
.day-block.open .day-tasks{display:block;}
.task-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer;user-select:none;}
.task-row:last-child{border-bottom:none;}
.task-row.done{background:#fefefe;}
.t-icon{font-size:1.4rem;min-width:30px;text-align:center;}
.t-name{flex:1;font-size:.95rem;font-weight:700;color:#333;}
.task-row.done .t-name{text-decoration:line-through;color:#ccc;}
.check-box{width:28px;height:28px;border-radius:50%;border:2.5px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;transition:all .2s;}
.check-box.on{color:#fff;}

/* SUMMARY */
.week-summary{background:#fff;border-radius:18px;padding:16px;margin:12px 12px 0;box-shadow:0 4px 16px rgba(0,0,0,.07);}
.sum-title{font-size:1rem;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.sum-dates{font-size:.75rem;color:#aaa;font-weight:700;}
.day-chips{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto;}
.d-chip{flex-shrink:0;flex:1;min-width:38px;text-align:center;padding:7px 2px;border-radius:10px;background:#f5f5f5;}
.d-chip .cs{font-size:.9rem;font-weight:800;display:block;}
.d-chip .cl{font-size:.58rem;color:#aaa;font-weight:800;}
.d-chip .cd{font-size:.6rem;color:#bbb;font-weight:700;}
.prog-label{display:flex;justify-content:space-between;font-size:.8rem;font-weight:800;color:#777;margin-bottom:5px;}
.prog-bar{height:14px;border-radius:20px;background:#f0f0f0;overflow:hidden;}
.prog-fill{height:100%;border-radius:20px;transition:width .6s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden;}
.prog-fill::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);animation:sh 2s infinite;}
@keyframes sh{to{left:200%;}}
.stars-row{display:flex;gap:3px;justify-content:center;margin-top:10px;}
.s-icon{font-size:1.3rem;}
.s-empty{filter:grayscale(1) opacity(.25);}
.achieve{text-align:center;padding:10px;border-radius:14px;margin-top:10px;font-size:.9rem;font-weight:800;display:none;border:2px dashed;}
.achieve.show{display:block;animation:pop .4s ease;}
@keyframes pop{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}

/* SETTINGS */
.settings-header{padding:16px;font-size:1.2rem;font-weight:800;color:#444;}
.kids-list{padding:0 12px;}
.kid-card-settings{background:#fff;border-radius:20px;padding:16px;margin-bottom:12px;box-shadow:0 3px 12px rgba(0,0,0,.07);}
.kcs-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.kid-avatar-big{font-size:2.4rem;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.kid-name-input{font-size:1rem;font-weight:800;border:2.5px solid #eee;border-radius:12px;padding:8px 12px;width:100%;outline:none;color:#333;background:#fafafa;}
.kid-name-input:focus{border-color:#FF6B6B;}
.section-label{font-size:.72rem;font-weight:800;color:#aaa;letter-spacing:1px;margin-bottom:8px;text-transform:uppercase;}
.color-picker{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.color-dot{width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .2s;}
.color-dot.sel{border-color:#333;transform:scale(1.2);}
.animal-picker{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.animal-btn{font-size:1.5rem;width:44px;height:44px;border-radius:12px;border:2.5px solid transparent;background:#f5f5f5;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.animal-btn.sel{border-color:#FF6B6B;background:#FFE5E5;transform:scale(1.15);}
.task-edit-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.task-icon-pick{font-size:1.2rem;width:40px;height:40px;border-radius:10px;border:2px solid #eee;background:#fafafa;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.task-name-inp{flex:1;padding:9px 12px;border:2px solid #eee;border-radius:10px;font-size:.9rem;font-weight:700;outline:none;background:#fafafa;}
.task-name-inp:focus{border-color:#FF6B6B;}
.del-task-btn{width:32px;height:32px;border-radius:50%;border:none;background:#FFE5E5;color:#FF6B6B;font-size:1rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.add-task-btn{width:100%;padding:11px;border:2.5px dashed #ddd;border-radius:12px;background:none;font-size:.95rem;font-weight:800;color:#aaa;cursor:pointer;margin-top:4px;}
.del-kid-btn{width:100%;padding:11px;border:2px solid #FFE5E5;border-radius:12px;background:none;font-size:.9rem;font-weight:800;color:#FF6B6B;cursor:pointer;margin-top:8px;}
.add-kid-big-btn{display:block;width:calc(100% - 24px);margin:0 12px 12px;padding:14px;border:2.5px dashed #ddd;border-radius:18px;background:none;font-size:1rem;font-weight:800;color:#aaa;cursor:pointer;text-align:center;}
.save-settings-btn{display:block;width:calc(100% - 24px);margin:0 12px 16px;padding:14px;border:none;border-radius:18px;background:linear-gradient(135deg,#FF6B6B,#FF8E53);color:#fff;font-size:1rem;font-weight:800;cursor:pointer;text-align:center;}

/* EMOJI MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-end;justify-content:center;z-index:200;}
.modal-bg.open{display:flex;}
.emoji-modal{background:#fff;border-radius:26px 26px 0 0;padding:20px;width:100%;max-width:430px;max-height:70vh;overflow-y:auto;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.emoji-modal h3{font-size:1.1rem;font-weight:800;margin-bottom:14px;}
.emoji-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;}
.e-btn{font-size:1.5rem;width:42px;height:42px;border-radius:10px;border:none;background:#f5f5f5;cursor:pointer;}
.modal-close{width:100%;padding:13px;border:none;border-radius:14px;background:#f0f0f0;font-size:1rem;font-weight:800;color:#666;cursor:pointer;margin-top:12px;}

.save-toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:24px;font-size:.88rem;font-weight:800;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.save-toast.show{opacity:1;}
.confetti-p{position:fixed;width:9px;height:9px;top:-20px;animation:cf 1.4s ease-in forwards;border-radius:2px;z-index:999;pointer-events:none;}
@keyframes cf{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-screen" id="loading-screen">
  <div class="spinner"></div>
  <p id="loading-text">Loading...</p>
</div>

<!-- LANGUAGE SCREEN -->
<div class="lang-screen" id="lang-screen" style="display:none;">
  <div class="lang-logo">⭐</div>
  <div class="lang-title">Mission Tracker</div>
  <div class="lang-sub">Choose your language</div>
  <div class="lang-grid">
    <button class="lang-btn" onclick="setLang('en')">
      <span class="lang-flag">🇬🇧</span>
      <span class="lang-name">English</span>
      <span class="lang-native">English</span>
    </button>
    <button class="lang-btn" onclick="setLang('fr')">
      <span class="lang-flag">🇫🇷</span>
      <span class="lang-name">Français</span>
      <span class="lang-native">French</span>
    </button>
    <button class="lang-btn" onclick="setLang('ar')">
      <span class="lang-flag">🇩🇿</span>
      <span class="lang-name">العربية</span>
      <span class="lang-native">Arabic</span>
    </button>
    <button class="lang-btn" onclick="setLang('de')">
      <span class="lang-flag">🇩🇪</span>
      <span class="lang-name">Deutsch</span>
      <span class="lang-native">German</span>
    </button>
  </div>
</div>

<!-- AUTH -->
<div class="auth-screen" id="auth-screen" style="display:none;">
  <div class="auth-logo">⭐</div>
  <div class="auth-title" id="auth-title">Mission Tracker</div>
  <div class="auth-sub" id="auth-sub">Your kids' habit tracker</div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Login</button>
      <button class="auth-tab" id="tab-signup" onclick="switchAuthTab('signup')">Sign Up</button>
    </div>
    <div class="auth-error" id="auth-error"></div>
    <input class="auth-input" id="auth-email" type="email" placeholder="Email">
    <input class="auth-input" id="auth-password" type="password" placeholder="Password">
    <button class="auth-btn" id="auth-submit-btn" onclick="handleAuth()">Login</button>
  </div>
  <button class="back-lang-btn" onclick="goBackToLang()">🌍 Change language</button>
</div>

<!-- MAIN APP -->
<div class="app-wrap" id="app-wrap">
  <div class="app-header">
    <div class="header-row">
      <div class="header-title">⭐ <span id="app-title-text">Mission Tracker</span></div>
      <div class="header-right">
        <span class="user-email" id="user-email-display"></span>
        <button class="logout-btn" id="logout-btn" onclick="handleLogout()">Logout</button>
      </div>
    </div>
  </div>

  <div class="page active" id="page-tracker">
    <div class="kids-tabs" id="kids-tabs"></div>
    <div id="tracker-card-wrap"></div>
    <div id="week-summary-wrap"></div>
  </div>

  <div class="page" id="page-settings">
    <div class="settings-header" id="settings-header-text">⚙️ Customize</div>
    <div class="kids-list" id="settings-kids-list"></div>
    <button class="add-kid-big-btn" id="add-kid-btn" onclick="addKid()">➕ Add Child</button>
    <button class="save-settings-btn" id="save-cloud-btn" onclick="saveToCloud()">☁️ Save to Cloud</button>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-tracker" onclick="showPage('tracker')">
      <span class="nav-icon">📋</span>
      <span id="nav-tracker-label">Tracker</span>
    </button>
    <button class="nav-btn" id="nav-settings" onclick="showPage('settings')">
      <span class="nav-icon">⚙️</span>
      <span id="nav-settings-label">Customize</span>
    </button>
  </div>
</div>

<!-- EMOJI MODAL -->
<div class="modal-bg" id="emoji-modal-bg">
  <div class="emoji-modal">
    <h3 id="emoji-modal-title">Pick an Emoji</h3>
    <div class="emoji-grid" id="emoji-grid"></div>
    <button class="modal-close" id="emoji-close-btn" onclick="closeEmojiModal()">Close</button>
  </div>
</div>

<div class="save-toast" id="save-toast">✅ Saved!</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAafkiRvudiyg9_BHH_dHan3zSkZtNJmz0",
  authDomain: "kids-tracker-ee287.firebaseapp.com",
  projectId: "kids-tracker-ee287",
  storageBucket: "kids-tracker-ee287.firebasestorage.app",
  messagingSenderId: "677673433845",
  appId: "1:677673433845:web:1edc57866921c6d278a3bc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window._auth = auth;
window._db = db;
window._createUser = createUserWithEmailAndPassword;
window._signIn = signInWithEmailAndPassword;
window._signOut = signOut;
window._getDoc = getDoc;
window._setDoc = setDoc;
window._doc = doc;

onAuthStateChanged(auth, async (user) => {
  if (user) {
    window.currentUser = user;
    document.getElementById('user-email-display').textContent = user.email;

    document.getElementById('lang-screen').style.display = 'none';
    document.getElementById('app-wrap').style.display = 'block';
    applyLangToApp();
    renderTracker();
  } else {
    window.currentUser = null;
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('app-wrap').style.display = 'none';
    const savedLang = localStorage.getItem('mtracker-lang');
    if (savedLang) { currentLang = savedLang; applyBodyLang(); showAuth(); }
    else document.getElementById('lang-screen').style.display = 'flex';
  }
});

async function loadFromCloud(uid) {
  try {
    const ref = window._doc(window._db, 'users', uid);
    const snap = await window._getDoc(ref);
    if (snap.exists()) {
      const data = snap.data();
      state.kids = data.kids || defaultKids();
      state.checks = data.checks || {};
      state.currentMonth = data.currentMonth || {month: new Date().getMonth(), year: new Date().getFullYear()};
      state.currentWeek = data.currentWeek || {};
      if (data.lang) currentLang = data.lang;
      fixState();
    } else {
      state.kids = defaultKids();
      state.checks = {};
      state.currentMonth = {month: new Date().getMonth(), year: new Date().getFullYear()};
      state.currentWeek = {};
      fixState();
      await saveToCloud();
    }
  } catch(e) { state.kids = defaultKids(); fixState(); }
}
window.loadFromCloud = loadFromCloud;
</script>

// Get all weeks of a month as arrays of 7 dates (Mon-Sun)
function getWeeksOfMonth(year, month) {
  const weeks = [];
  // Find first Monday on or before the 1st of month
  const firstDay = new Date(year, month, 1);
  // Day of week: 0=Sun,1=Mon...6=Sat → convert to Mon=0
  const firstDayOfWeek = (firstDay.getDay() + 6) % 7;
  const startDate = new Date(firstDay);
  startDate.setDate(1 - firstDayOfWeek);

  for (let w = 0; w < 6; w++) {
    const week = [];
    for (let d = 0; d < 7; d++) {
      const date = new Date(startDate);
      date.setDate(startDate.getDate() + w * 7 + d);
      week.push(date);
    }
    // Only include week if it overlaps with the month
    const hasMonthDay = week.some(d => d.getMonth() === month);
    if (hasMonthDay) weeks.push(week);
  }
  return weeks;
}

function dateKey(date) {
  return `${date.getFullYear()}-${date.getMonth()}-${date.getDate()}`;
}

function monthKey(year, month) {
  return `${year}-${month}`;
}

    const isToday = date.toDateString() === today.toDateString();
    const openKey = dk+'_'+kid.id;
    const isOpen = openDays[openKey] !== undefined ? openDays[openKey] : isToday;

    const block = document.createElement('div');
    block.className = 'day-block'+(isOpen?' open':'');
    if (!isInMonth) block.style.opacity = '0.45';

    const header = document.createElement('div');
    header.className = 'day-header';
    header.style.background = isToday ? col.light : '#fff';
    header.innerHTML = `
      <div class="day-left">
        <span class="day-badge" style="background:${isInMonth?col.main:'#ccc'}">${days[d]}</span>
        <span class="day-date-num" style="color:${isToday?col.dark:'#aaa'}">${date.getDate()}</span>
        <span class="day-score">${done}/${total} ${done===total&&total>0?'⭐':''}</span>
      </div>
      <span class="day-arrow">▼</span>`;
    header.onclick = () => {
      openDays[openKey] = !block.classList.contains('open');
      block.classList.toggle('open');
    };
    block.appendChild(header);

    const td = document.createElement('div');
    td.className = 'day-tasks';
    kid.tasks.forEach((task, t) => {
      const isDone = checks[t];
      const row = document.createElement('div');
      row.className = 'task-row'+(isDone?' done':'');
      row.innerHTML = `
        <span class="t-icon">${task.icon}</span>
        <span class="t-name">${task.name}</span>
        <div class="check-box ${isDone?'on':''}" style="${isDone?`background:${col.main};border-color:${col.main}`:''}">
          ${isDone?'✓':''}
        </div>`;
      row.onclick = () => toggleTask(date, t);
      td.appendChild(row);
    });
    block.appendChild(td);
    card.appendChild(block);
  });

  wrap.appendChild(card);
}

function renderWeekSummary() {
  const kid = state.kids[state.currentKid];
  if (!kid) return;
  const col = PALETTE[kid.colorIdx||0];
  const {month, year} = state.currentMonth;
  const weeks = getWeeksOfMonth(year, month);
  const currentWeekIdx = state.currentWeek[kid.id] || 0;
  const currentWeek = weeks[currentWeekIdx] || weeks[0];
  const days = tr('days');
  const mk = monthKey(year, month);

  const wrap = document.getElementById('week-summary-wrap');
  wrap.innerHTML = '';
  const box = document.createElement('div');
  box.className = 'week-summary';

  let totalDone=0, totalMax=0;
  const fullDays = [];
  const chips = document.createElement('div');
  chips.className = 'day-chips';

  currentWeek.forEach((date, d) => {
    const isInMonth = date.getMonth() === month;
    const dk = dateKey(date);
    if (!state.checks[kid.id][mk]) state.checks[kid.id][mk] = {};
    if (!state.checks[kid.id][mk][dk]) state.checks[kid.id][mk][dk] = new Array(kid.tasks.length).fill(false);
    const checks = state.checks[kid.id][mk][dk];
    const done = checks.filter(Boolean).length;
    const total = kid.tasks.length;
    if (isInMonth) { totalDone+=done; totalMax+=total; }
    const full = done===total&&total>0&&isInMonth;
    fullDays.push(full);

    const chip = document.createElement('div');
    chip.className = 'd-chip';
    chip.style.background = full?col.light:isInMonth?'#f5f5f5':'#f9f9f9';
    chip.style.opacity = isInMonth?'1':'0.5';
    chip.innerHTML = `
      <span class="cs" style="color:${full?col.dark:'#aaa'}">${full?'⭐':isInMonth?done:'-'}</span>
      <span class="cl">${days[d]}</span>
      <span class="cd">${date.getDate()}</span>`;
    chips.appendChild(chip);
  });

  const pct = totalMax>0?Math.round((totalDone/totalMax)*100):0;
  const earned = fullDays.filter(Boolean).length;
  const months = tr('months');
  const wkStart = currentWeek.find(d=>d.getMonth()===month);
  const wkEnd = [...currentWeek].reverse().find(d=>d.getMonth()===month);

  box.innerHTML = `
    <div class="sum-title">
      ${tr('weekProgress')} ${currentWeekIdx+1}
      <span class="sum-dates">${months[month]} ${wkStart?wkStart.getDate():''} – ${wkEnd?wkEnd.getDate():''}</span>
    </div>`;
  box.appendChild(chips);
  box.innerHTML += `
    <div class="prog-label"><span>${tr('totalProgress')}</span><span>${totalDone}/${totalMax} (${pct}%)</span></div>
    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:linear-gradient(90deg,${col.grad})"></div></div>
    <div class="stars-row">${Array.from({length:7},(_,i)=>`<span class="s-icon ${fullDays[i]?'':'s-empty'}">⭐</span>`).join('')}</div>`;

  if (earned>=3) {
    const msg = earned===7?tr('perfectWeek'):earned>=5?`${tr('amazing')} ${earned}/7 ${tr('perfectDays')}`:`${tr('great')} ${earned}/7 ${tr('perfectDays')}`;
    const ach = document.createElement('div');
    ach.className='achieve show';
    ach.style.cssText=`background:${col.light};color:${col.dark};border-color:${col.main}`;
    ach.textContent=msg;
    box.appendChild(ach);
  }
  wrap.appendChild(box);
}

function changeMonth(dir) {
  let {month, year} = state.currentMonth;
  month += dir;
  if (month > 11) { month=0; year++; }
  if (month < 0) { month=11; year--; }
  state.currentMonth = {month, year};
  const kid = state.kids[state.currentKid];
  if (kid) state.currentWeek[kid.id] = 0;
  showMonthGrid = false;
  renderTracker(); quickSave();
}
window.changeMonth = changeMonth;

function toggleMonthGrid() {
  showMonthGrid = !showMonthGrid;
  const el = document.getElementById('month-grid-wrap');
  if (el) el.classList.toggle('open', showMonthGrid);
}
window.toggleMonthGrid = toggleMonthGrid;

function changeYear(dir) {
  tempYear += dir;
  const el = document.getElementById('temp-year-display');
  if (el) el.textContent = tempYear;
}
window.changeYear = changeYear;

async function toggleTask(date, t) {
  const kid = state.kids[state.currentKid];
  const {month, year} = state.currentMonth;
  const mk = monthKey(year, month);
  const dk = dateKey(date);
  if (!state.checks[kid.id][mk]) state.checks[kid.id][mk] = {};
  if (!state.checks[kid.id][mk][dk]) state.checks[kid.id][mk][dk] = new Array(kid.tasks.length).fill(false);
  const val = !state.checks[kid.id][mk][dk][t];
  state.checks[kid.id][mk][dk][t] = val;
  if (val) spawnConfetti(kid.colorIdx||0);
  renderTrackerCard(); renderWeekSummary();
  await quickSave();
}

// ── SETTINGS ──
function renderSettings() {
  const list = document.getElementById('settings-kids-list');
  list.innerHTML = '';
  state.kids.forEach((kid,i) => {
    const col = PALETTE[kid.colorIdx||0];
    const card = document.createElement('div');
    card.className = 'kid-card-settings';
    card.innerHTML = `
      <div class="kcs-top">
        <div class="kid-avatar-big" style="background:${col.light}">${kid.animal}</div>
        <div style="flex:1">
          <input class="kid-name-input" value="${kid.name}" placeholder="Name"
            onchange="state.kids[${i}].name=this.value" style="border-color:${col.main}40">
        </div>
      </div>
      <div class="section-label">${tr('colorTheme')}</div>
      <div class="color-picker" id="cp-${i}"></div>
      <div class="section-label">${tr('animalAvatar')}</div>
      <div class="animal-picker" id="ap-${i}"></div>
      <div class="section-label">${tr('dailyTasks')}</div>
      <div class="tasks-editor" id="te-${i}"></div>
      <button class="add-task-btn" onclick="addTask(${i})">${tr('addTask')}</button>
      ${state.kids.length>1?`<button class="del-kid-btn" onclick="deleteKid(${i})">${tr('removeKid')} ${kid.name}</button>`:''}
    `;
    list.appendChild(card);

    const cp = card.querySelector('#cp-'+i);
    PALETTE.forEach((p,ci) => {
      const dot = document.createElement('div');
      dot.className='color-dot'+(kid.colorIdx===ci?' sel':'');
      dot.style.background=p.main;
      dot.onclick=()=>{state.kids[i].colorIdx=ci;renderSettings();};
      cp.appendChild(dot);
    });

    const ap = card.querySelector('#ap-'+i);
    ANIMALS.forEach(a => {
      const btn = document.createElement('button');
      btn.className='animal-btn'+(kid.animal===a?' sel':'');
      btn.textContent=a;
      btn.onclick=()=>{state.kids[i].animal=a;renderSettings();};
      ap.appendChild(btn);
    });

    const te = card.querySelector('#te-'+i);
    kid.tasks.forEach((task,t) => {
      const row = document.createElement('div');
      row.className='task-edit-row';
      row.innerHTML=`
        <div class="task-icon-pick" onclick="openEmojiModal(${i},${t})">${task.icon}</div>
        <input class="task-name-inp" value="${task.name}" placeholder="Task"
          onchange="state.kids[${i}].tasks[${t}].name=this.value">
        <button class="del-task-btn" onclick="deleteTask(${i},${t})">✕</button>`;
      te.appendChild(row);
    });
  });
}

function addKid() {
  const id='k'+Date.now();
  const used=state.kids.map(k=>k.colorIdx||0);
  let colorIdx=0;
  for(let c=0;c<PALETTE.length;c++){if(!used.includes(c)){colorIdx=c;break;}}
  state.kids.push({id,name:'Child '+(state.kids.length+1),animal:ANIMALS[Math.floor(Math.random()*ANIMALS.length)],colorIdx,tasks:JSON.parse(JSON.stringify(T[currentLang].tasks))});
  fixState(); renderSettings();
}
window.addKid=addKid;

function deleteKid(i) {
  if(state.kids.length<=1)return;
  if(!confirm(tr('removeKid')+' '+state.kids[i].name+'?'))return;
  state.kids.splice(i,1);
  if(state.currentKid>=state.kids.length)state.currentKid=0;
  renderSettings();
}
window.deleteKid=deleteKid;

function addTask(kidIdx) {
  state.kids[kidIdx].tasks.push({icon:'⭐',name:'New Task'});
  fixState(); renderSettings();
}
window.addTask=addTask;

function deleteTask(kidIdx,taskIdx) {
  if(state.kids[kidIdx].tasks.length<=1)return;
  state.kids[kidIdx].tasks.splice(taskIdx,1);
  fixState(); renderSettings();
}
window.deleteTask=deleteTask;

function openEmojiModal(kidIdx,taskIdx) {
  emojiCallback=(emoji)=>{state.kids[kidIdx].tasks[taskIdx].icon=emoji;renderSettings();};
  const grid=document.getElementById('emoji-grid');
  grid.innerHTML='';
  ALL_EMOJIS.forEach(em=>{
    const btn=document.createElement('button');
    btn.className='e-btn';btn.textContent=em;
    btn.onclick=()=>{emojiCallback(em);closeEmojiModal();};
    grid.appendChild(btn);
  });
  document.getElementById('emoji-modal-bg').classList.add('open');
}
window.openEmojiModal=openEmojiModal;

function closeEmojiModal(){document.getElementById('emoji-modal-bg').classList.remove('open');}
window.closeEmojiModal=closeEmojiModal;

function spawnConfetti(colorIdx) {
  const col=PALETTE[colorIdx||0];
  const colors=[col.main,col.dark,'#FFD700','#fff'];
  for(let i=0;i<16;i++){
    const c=document.createElement('div');
    c.className='confetti-p';
    c.style.left=(Math.random()*100)+'vw';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration=(.7+Math.random()*.8)+'s';
    c.style.animationDelay=(Math.random()*.3)+'s';
    c.style.borderRadius=Math.random()>.5?'50%':'2px';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),1600);
  }
}
</script>
