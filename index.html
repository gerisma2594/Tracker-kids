<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⭐ Kids Mission Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;max-width:430px;margin:0 auto;font-family:'Nunito',sans-serif;background:#FFF9F0;min-height:100vh;overflow-x:hidden;}

/* AUTH SCREEN */
.auth-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#FF6B6B22,#4ECDC422);}
.auth-logo{font-size:3rem;margin-bottom:8px;}
.auth-title{font-family:‘Fredoka One’,cursive;font-size:2rem;color:#FF6B6B;margin-bottom:4px;}
.auth-sub{color:#aaa;font-size:.85rem;font-weight:700;margin-bottom:32px;}
.auth-card{background:#fff;border-radius:24px;padding:24px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.1);}
.auth-tabs{display:flex;margin-bottom:20px;background:#f5f5f5;border-radius:14px;padding:4px;}
.auth-tab{flex:1;padding:8px;border:none;background:none;font-family:‘Fredoka One’,cursive;font-size:.95rem;color:#aaa;cursor:pointer;border-radius:10px;transition:all .2s;}
.auth-tab.active{background:#fff;color:#FF6B6B;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.auth-input{width:100%;padding:12px 14px;border:2px solid #eee;border-radius:14px;font-family:‘Nunito’,sans-serif;font-size:.95rem;outline:none;margin-bottom:12px;transition:border-color .2s;}
.auth-input:focus{border-color:#FF6B6B;}
.auth-btn{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#FF6B6B,#FF8E53);color:#fff;font-family:‘Fredoka One’,cursive;font-size:1.1rem;cursor:pointer;transition:all .2s;margin-top:4px;}
.auth-btn:hover{transform:scale(1.02);}
.auth-btn:disabled{opacity:.6;transform:none;}
.auth-error{color:#FF6B6B;font-size:.8rem;font-weight:700;margin-bottom:10px;text-align:center;min-height:18px;}
.auth-divider{text-align:center;color:#ccc;font-size:.8rem;font-weight:700;margin:12px 0;}

/* MAIN APP */
.app-wrap{display:none;}
.app-header{background:linear-gradient(135deg,#FF6B6B,#FF8E53 50%,#4ECDC4);padding:14px 16px 18px;position:relative;overflow:hidden;}
.app-header::before{content:’’;position:absolute;inset:0;background:url(“data:image/svg+xml,%3Csvg width=‘40’ height=‘40’ viewBox=‘0 0 40 40’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cg fill=’%23fff’ fill-opacity=‘0.07’%3E%3Cpath d=‘M20 20.5V18H0v5h20v20.5h5V23h20v-5H25V2.5h-5z’/%3E%3C/g%3E%3C/svg%3E”);}
.header-row{display:flex;align-items:center;justify-content:space-between;position:relative;}
.header-title{font-family:‘Fredoka One’,cursive;font-size:1.5rem;color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.1);}
.header-user{display:flex;align-items:center;gap:8px;}
.user-email{color:rgba(255,255,255,.85);font-size:.7rem;font-weight:800;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.logout-btn{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:.7rem;font-weight:800;padding:5px 10px;border-radius:10px;cursor:pointer;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid #eee;display:flex;z-index:50;box-shadow:0 -4px 20px rgba(0,0,0,.08);}
.nav-btn{flex:1;padding:10px 4px 8px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:‘Nunito’,sans-serif;font-size:.62rem;font-weight:800;color:#bbb;transition:color .2s;}
.nav-btn.active{color:#FF6B6B;}
.nav-icon{font-size:1.3rem;}

/* PAGES */
.page{display:none;padding-bottom:80px;}
.page.active{display:block;}

/* LOADING */
.loading-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.spinner{width:40px;height:40px;border:4px solid #eee;border-top-color:#FF6B6B;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-screen p{font-family:‘Fredoka One’,cursive;color:#aaa;font-size:1rem;}

/* KIDS TABS */
.kids-tabs{display:flex;gap:0;overflow-x:auto;padding:12px 12px 0;scrollbar-width:none;}
.kids-tabs::-webkit-scrollbar{display:none;}
.kid-tab{flex-shrink:0;padding:10px 14px;border:none;border-radius:14px 14px 0 0;font-family:‘Fredoka One’,cursive;font-size:.85rem;cursor:pointer;transition:all .2s;background:#f0f0f0;color:#999;display:flex;align-items:center;gap:6px;}
.kid-tab.active{color:#fff;transform:translateY(-2px);box-shadow:0 -3px 10px rgba(0,0,0,.12);}
.add-kid-tab{flex-shrink:0;padding:10px 14px;border:2px dashed #ddd;border-radius:14px 14px 0 0;background:none;cursor:pointer;font-size:1.2rem;color:#ccc;}

/* TRACKER CARD */
.tracker-card{margin:0 12px;border-radius:0 0 20px 20px;padding:16px;box-shadow:0 6px 24px rgba(0,0,0,.1);}
.week-bar{display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
.week-bar::-webkit-scrollbar{display:none;}
.week-btn{flex-shrink:0;padding:6px 12px;border-radius:18px;border:2px solid transparent;font-family:‘Fredoka One’,cursive;font-size:.78rem;cursor:pointer;background:#f0f0f0;color:#999;transition:all .2s;}
.week-btn.sel{color:#fff;}

/* DAY ACCORDION */
.day-block{margin-bottom:8px;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.day-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;background:#fff;}
.day-badge{font-family:‘Fredoka One’,cursive;font-size:.75rem;color:#fff;padding:3px 10px;border-radius:12px;}
.day-score{font-size:.75rem;font-weight:800;color:#aaa;}
.day-arrow{font-size:.7rem;color:#ccc;transition:transform .2s;}
.day-block.open .day-arrow{transform:rotate(180deg);}
.day-tasks{display:none;background:#fafafa;}
.day-block.open .day-tasks{display:block;}
.task-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .15s;user-select:none;}
.task-row:last-child{border-bottom:none;}
.task-row.done{background:#fefefe;}
.t-icon{font-size:1.3rem;min-width:28px;text-align:center;}
.t-name{flex:1;font-weight:700;font-size:.85rem;color:#333;}
.task-row.done .t-name{text-decoration:line-through;color:#ccc;}
.check-box{width:26px;height:26px;border-radius:50%;border:2.5px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;transition:all .2s;}
.check-box.on{color:#fff;}

/* SUMMARY */
.week-summary{background:#fff;border-radius:18px;padding:16px;margin:12px 12px 0;box-shadow:0 4px 16px rgba(0,0,0,.07);}
.sum-title{font-family:‘Fredoka One’,cursive;font-size:1rem;margin-bottom:12px;}
.day-chips{display:flex;gap:4px;margin-bottom:12px;}
.d-chip{flex:1;text-align:center;padding:6px 2px;border-radius:10px;background:#f5f5f5;}
.d-chip .cs{font-family:‘Fredoka One’,cursive;font-size:.95rem;display:block;}
.d-chip .cl{font-size:.55rem;color:#aaa;font-weight:800;}
.prog-label{display:flex;justify-content:space-between;font-size:.75rem;font-weight:800;color:#777;margin-bottom:5px;}
.prog-bar{height:14px;border-radius:20px;background:#f0f0f0;overflow:hidden;}
.prog-fill{height:100%;border-radius:20px;transition:width .6s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden;}
.prog-fill::after{content:’’;position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);animation:sh 2s infinite;}
@keyframes sh{to{left:200%;}}
.stars-row{display:flex;gap:3px;justify-content:center;margin-top:10px;}
.s-icon{font-size:1.2rem;}
.s-empty{filter:grayscale(1) opacity(.25);}
.achieve{text-align:center;padding:10px;border-radius:14px;margin-top:10px;font-weight:800;font-size:.8rem;display:none;border:2px dashed;}
.achieve.show{display:block;animation:pop .4s ease;}
@keyframes pop{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}

/* SETTINGS */
.settings-header{padding:16px;font-family:‘Fredoka One’,cursive;font-size:1.2rem;color:#444;}
.kids-list{padding:0 12px;}
.kid-card-settings{background:#fff;border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:0 3px 12px rgba(0,0,0,.07);}
.kcs-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.kid-avatar-big{font-size:2.4rem;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.kid-name-input{font-family:‘Fredoka One’,cursive;font-size:1rem;border:2px solid #eee;border-radius:10px;padding:6px 10px;width:100%;outline:none;color:#333;}
.section-label{font-size:.7rem;font-weight:800;color:#aaa;letter-spacing:1px;margin-bottom:8px;text-transform:uppercase;}
.color-picker{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.color-dot{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .2s;}
.color-dot.sel{border-color:#333;transform:scale(1.2);}
.animal-picker{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.animal-btn{font-size:1.5rem;width:42px;height:42px;border-radius:12px;border:2.5px solid transparent;background:#f5f5f5;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.animal-btn.sel{border-color:#FF6B6B;background:#FFE5E5;transform:scale(1.15);}
.task-edit-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.task-icon-pick{font-size:1.2rem;width:38px;height:38px;border-radius:10px;border:2px solid #eee;background:#fafafa;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.task-name-inp{flex:1;padding:8px 10px;border:2px solid #eee;border-radius:10px;font-family:‘Nunito’,sans-serif;font-size:.85rem;outline:none;}
.task-name-inp:focus{border-color:#FF6B6B;}
.del-task-btn{width:30px;height:30px;border-radius:50%;border:none;background:#FFE5E5;color:#FF6B6B;font-size:1rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.add-task-btn{width:100%;padding:10px;border:2px dashed #ddd;border-radius:12px;background:none;font-family:‘Fredoka One’,cursive;font-size:.9rem;color:#aaa;cursor:pointer;margin-top:4px;}
.del-kid-btn{width:100%;padding:10px;border:2px solid #FFE5E5;border-radius:12px;background:none;font-family:‘Fredoka One’,cursive;font-size:.85rem;color:#FF6B6B;cursor:pointer;margin-top:8px;}
.add-kid-big-btn{display:block;width:calc(100% - 24px);margin:0 12px 16px;padding:14px;border:2.5px dashed #ddd;border-radius:18px;background:none;font-family:‘Fredoka One’,cursive;font-size:1rem;color:#aaa;cursor:pointer;text-align:center;}
.save-settings-btn{display:block;width:calc(100% - 24px);margin:0 12px 16px;padding:14px;border:none;border-radius:18px;background:linear-gradient(135deg,#FF6B6B,#FF8E53);color:#fff;font-family:‘Fredoka One’,cursive;font-size:1rem;cursor:pointer;text-align:center;}

/* EMOJI MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-end;justify-content:center;z-index:200;}
.modal-bg.open{display:flex;}
.emoji-modal{background:#fff;border-radius:24px 24px 0 0;padding:20px;width:100%;max-width:430px;max-height:70vh;overflow-y:auto;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.emoji-modal h3{font-family:‘Fredoka One’,cursive;font-size:1.1rem;margin-bottom:14px;}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;}
.e-btn{font-size:1.4rem;width:38px;height:38px;border-radius:10px;border:none;background:#f5f5f5;cursor:pointer;}
.modal-close{width:100%;padding:12px;border:none;border-radius:14px;background:#f0f0f0;font-family:‘Fredoka One’,cursive;font-size:1rem;color:#666;cursor:pointer;margin-top:12px;}

/* TOAST */
.save-toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 18px;border-radius:20px;font-size:.8rem;font-weight:800;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.save-toast.show{opacity:1;}

/* CONFETTI */
.confetti-p{position:fixed;width:9px;height:9px;top:-20px;animation:cf 1.4s ease-in forwards;border-radius:2px;z-index:999;pointer-events:none;}
@keyframes cf{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
</style>

</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAafkiRvudiyg9_BHH_dHan3zSkZtNJmz0",
  authDomain: "kids-tracker-ee287.firebaseapp.com",
  projectId: "kids-tracker-ee287",
  storageBucket: "kids-tracker-ee287.firebasestorage.app",
  messagingSenderId: "677673433845",
  appId: "1:677673433845:web:1edc57866921c6d278a3bc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const googleProvider = new GoogleAuthProvider();

// Expose to window
window._auth = auth;
window._db = db;
window._googleProvider = googleProvider;
window._createUser = createUserWithEmailAndPassword;
window._signIn = signInWithEmailAndPassword;
window._signOut = signOut;
window._googleSignIn = signInWithPopup;
window._getDoc = getDoc;
window._setDoc = setDoc;
window._doc = doc;

// Auth state listener
onAuthStateChanged(auth, async (user) => {
  if (user) {
    window.currentUser = user;
    document.getElementById('user-email-display').textContent = user.email || user.displayName;
    await loadFromCloud(user.uid);
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-wrap').style.display = 'block';
    renderTracker();
  } else {
    window.currentUser = null;
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-wrap').style.display = 'none';
  }
});

async function loadFromCloud(uid) {
  try {
    const ref = window._doc(window._db, 'users', uid);
    const snap = await window._getDoc(ref);
    if (snap.exists()) {
      const data = snap.data();
      state.kids = data.kids || defaultKids();
      state.checks = data.checks || {};
      state.currentWeek = data.currentWeek || {};
      fixState();
    } else {
      state.kids = defaultKids();
      state.checks = {};
      state.currentWeek = {};
      fixState();
      await saveToCloud();
    }
  } catch(e) {
    console.error(e);
    state.kids = defaultKids();
    fixState();
  }
}
window.loadFromCloud = loadFromCloud;
</script>

<script>
// ── DATA ──
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const WEEKS = 5;
const ALL_EMOJIS = ['⭐','📚','🏃','🧹','🍎','🎨','🎵','💪','🧼','🛏','🥗','🎮','📖','🌿','🧘','✏️','🐶','🎯','💧','🦷','⏰','🎒','😴','🚿','🧺','🏊','🚴','🍳','🧩','🎪','🌟','🏆','🎁','🌈','🦋','🐝','🌸','🍕','🥤','🧁','🎭','🎬','🎤','🎻','🥁','🏋️','🤸','⚽','🏀','🎾','🧲','🔬','🌍','🚀','✈️','🏖','🏔','🎡','🎢','🎠','🦄','🐯','🦊','🐼','🐨','🐸','🦅','🐬','🦁','🐧','🐙'];
const ANIMALS = ['🦁','🐯','🦊','🐼','🐨','🐸','🦅','🐬','🐧','🐙','🦄','🐶','🐱','🐻','🐺','🦋','🐝','🦖','🦕','🐲'];
const PALETTE = [
  {name:'Red',    main:'#FF6B6B',light:'#FFE5E5',dark:'#C0392B',grad:'#FF6B6B,#FF8E53'},
  {name:'Teal',   main:'#4ECDC4',light:'#E0F7F6',dark:'#1A9B93',grad:'#4ECDC4,#45B7D1'},
  {name:'Purple', main:'#9B59B6',light:'#F3E5F5',dark:'#6C3483',grad:'#9B59B6,#C39BD3'},

  {name:'Blue',   main:'#3498DB',light:'#EBF5FB',dark:'#1A5276',grad:'#3498DB,#74B9FF'},
  {name:'Pink',   main:'#FF6B9D',light:'#FFE5F0',dark:'#B03060',grad:'#FF6B9D,#FFC0CB'},
  {name:'Yellow', main:'#F1C40F',light:'#FEF9E7',dark:'#9A7D0A',grad:'#F1C40F,#FFEAA7'},
];

const DEFAULT_TASKS = [
  {icon:'⏰',name:'Wake up on time'},
  {icon:'🦷',name:'Brush teeth'},
  {icon:'🛏',name:'Make the bed'},
  {icon:'📚',name:'Do homework'},
  {icon:'🧹',name:'Tidy my room'},
  {icon:'🍎',name:'Eat fruits'},
  {icon:'📖',name:'Read 15 mins'},
  {icon:'💧',name:'Drink water'},
  {icon:'😴',name:'Sleep on time'},
];

function defaultKids() {
  return [
    {id:'k0',name:'Alex (10)',animal:'🦁',colorIdx:0,tasks:JSON.parse(JSON.stringify(DEFAULT_TASKS))},
    {id:'k1',name:'Sam (8)', animal:'🐬',colorIdx:1,tasks:JSON.parse(JSON.stringify(DEFAULT_TASKS))},
  ];
}

let state = { kids:[], checks:{}, currentKid:0, currentWeek:{} };
let openDays = {};
let emojiCallback = null;

function fixState() {
  state.kids.forEach(kid => {
    if (!state.checks[kid.id]) state.checks[kid.id] = {};
    if (!state.currentWeek[kid.id]) state.currentWeek[kid.id] = 1;
    for (let w=1;w<=WEEKS;w++) {
      if (!state.checks[kid.id][w]) state.checks[kid.id][w] = {};
      for (let d=0;d<7;d++) {
        const need = kid.tasks.length;
        if (!state.checks[kid.id][w][d]) state.checks[kid.id][w][d] = new Array(need).fill(false);
        while (state.checks[kid.id][w][d].length < need) state.checks[kid.id][w][d].push(false);
      }
    }
  });
  if (!state.kids[state.currentKid]) state.currentKid = 0;
}

// ── CLOUD SAVE ──
async function saveToCloud() {
  if (!window.currentUser) return;
  try {
    const ref = window._doc(window._db, 'users', window.currentUser.uid);
    await window._setDoc(ref, { kids: state.kids, checks: state.checks, currentWeek: state.currentWeek });
    showToast('☁️ Saved to cloud!');
  } catch(e) { showToast('⚠️ Save failed'); console.error(e); }
}
window.saveToCloud = saveToCloud;

async function quickSave() {
  if (!window.currentUser) return;
  try {
    const ref = window._doc(window._db, 'users', window.currentUser.uid);
    await window._setDoc(ref, { kids: state.kids, checks: state.checks, currentWeek: state.currentWeek });
  } catch(e) { console.error(e); }
}

function showToast(msg) {
  const t = document.getElementById('save-toast');
  t.textContent = msg || '✅ Saved!';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── AUTH ──
let authMode = 'login';
function switchAuthTab(mode) {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&mode==='login')||(i===1&&mode==='signup')));
  document.getElementById('signup-extra').style.display = mode==='signup'?'block':'none';
  document.getElementById('auth-submit-btn').textContent = mode==='login'?'🚀 Login':'🎉 Create Account';
  document.getElementById('auth-error').textContent = '';
}
window.switchAuthTab = switchAuthTab;

async function handleAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl = document.getElementById('auth-error');
  const btn = document.getElementById('auth-submit-btn');
  if (!email || !password) { errEl.textContent = 'Please fill in all fields'; return; }
  btn.disabled = true;
  btn.textContent = '...';
  try {
    if (authMode === 'signup') {
      await window._createUser(window._auth, email, password);
    } else {
      await window._signIn(window._auth, email, password);
    }
    errEl.textContent = '';
  } catch(e) {
    errEl.textContent = e.message.replace('Firebase: ','').replace(/\(.*\)/,'');
    btn.disabled = false;
    btn.textContent = authMode==='login'?'🚀 Login':'🎉 Create Account';
  }
}
window.handleAuth = handleAuth;

async function handleGoogle() {
  try {
    await window._googleSignIn(window._auth, window._googleProvider);
  } catch(e) {
    document.getElementById('auth-error').textContent = e.message.replace('Firebase: ','').replace(/\(.*\)/,'');
  }
}
window.handleGoogle = handleGoogle;

async function handleLogout() {
  await window._signOut(window._auth);
}
window.handleLogout = handleLogout;

// ── PAGE NAV ──
function showPage(p) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('nav-'+p).classList.add('active');
  if (p==='settings') renderSettings();
  if (p==='tracker') renderTracker();
}
window.showPage = showPage;

// ── TRACKER ──
function renderTracker() {
  renderKidTabs();
  renderTrackerCard();
  renderWeekSummary();
}

function renderKidTabs() {
  const wrap = document.getElementById('kids-tabs');
  wrap.innerHTML = '';
  state.kids.forEach((kid, i) => {
    const col = PALETTE[kid.colorIdx||0];
    const btn = document.createElement('button');
    btn.className = 'kid-tab'+(i===state.currentKid?' active':'');
    btn.style.background = i===state.currentKid ? col.main : '#f0f0f0';
    btn.innerHTML = `<span>${kid.animal}</span><span>${kid.name}</span>`;
    btn.onclick = () => { state.currentKid=i; renderTracker(); };
    wrap.appendChild(btn);
  });
  const add = document.createElement('button');
  add.className = 'add-kid-tab';
  add.textContent = '➕';
  add.onclick = () => { addKid(); showPage('settings'); };
  wrap.appendChild(add);
}

function renderTrackerCard() {
  const kid = state.kids[state.currentKid];
  if (!kid) return;
  const col = PALETTE[kid.colorIdx||0];
  const w = state.currentWeek[kid.id]||1;
  const wrap = document.getElementById('tracker-card-wrap');
  wrap.innerHTML = '';
  const card = document.createElement('div');
  card.className = 'tracker-card';
  card.style.background = `linear-gradient(160deg,${col.light} 0%,#fff 60%)`;
  card.style.borderTop = `4px solid ${col.main}`;

  const wb = document.createElement('div');
  wb.className = 'week-bar';
  for (let wk=1;wk<=WEEKS;wk++) {
    const b = document.createElement('button');
    b.className = 'week-btn'+(w===wk?' sel':'');
    b.style.background = w===wk?col.main:'#f0f0f0';
    b.style.color = w===wk?'#fff':'#999';
    b.textContent = 'Week '+wk;
    b.onclick = () => { state.currentWeek[kid.id]=wk; renderTracker(); quickSave(); };
    wb.appendChild(b);
  }
  card.appendChild(wb);

  DAYS.forEach((day, d) => {
    const checks = state.checks[kid.id][w][d];
    const done = checks.filter(Boolean).length;
    const total = kid.tasks.length;
    const key = kid.id+'_'+w+'_'+d;
    const todayIdx = (new Date().getDay()+6)%7;
    const isOpen = openDays[key] !== undefined ? openDays[key] : d===todayIdx;

    const block = document.createElement('div');
    block.className = 'day-block'+(isOpen?' open':'');

    const header = document.createElement('div');
    header.className = 'day-header';
    header.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="day-badge" style="background:${col.main}">${day}</span>
        <span class="day-score">${done}/${total} ${done===total&&total>0?'⭐':''}</span>
      </div>
      <span class="day-arrow">▼</span>`;
    header.onclick = () => { openDays[key]=!block.classList.contains('open'); block.classList.toggle('open'); };
    block.appendChild(header);

    const tasksDiv = document.createElement('div');
    tasksDiv.className = 'day-tasks';
    kid.tasks.forEach((task, t) => {
      const isDone = checks[t];
      const row = document.createElement('div');
      row.className = 'task-row'+(isDone?' done':'');
      row.innerHTML = `
        <span class="t-icon">${task.icon}</span>
        <span class="t-name">${task.name}</span>
        <div class="check-box ${isDone?'on':''}" style="${isDone?`background:${col.main};border-color:${col.main}`:''}">
          ${isDone?'✓':''}
        </div>`;
      row.onclick = () => toggleTask(d,t);
      tasksDiv.appendChild(row);
    });
    block.appendChild(tasksDiv);
    card.appendChild(block);
  });
  wrap.appendChild(card);
}

function renderWeekSummary() {
  const kid = state.kids[state.currentKid];
  if (!kid) return;
  const col = PALETTE[kid.colorIdx||0];
  const w = state.currentWeek[kid.id]||1;
  const wrap = document.getElementById('week-summary-wrap');
  wrap.innerHTML = '';
  const box = document.createElement('div');
  box.className = 'week-summary';
  let totalDone=0,totalMax=0;
  const fullDays=[];
  const chips = document.createElement('div');
  chips.className = 'day-chips';
  DAYS.forEach((day,d) => {
    const checks = state.checks[kid.id][w][d];
    const done = checks.filter(Boolean).length;
    const total = kid.tasks.length;
    totalDone+=done; totalMax+=total;
    const full = done===total&&total>0;
    fullDays.push(full);
    const chip = document.createElement('div');
    chip.className = 'd-chip';
    chip.style.background = full?col.light:'#f5f5f5';
    chip.innerHTML = `<span class="cs" style="color:${full?col.dark:'#aaa'}">${full?'⭐':done}</span><span class="cl">${day}</span>`;
    chips.appendChild(chip);
  });
  const pct = totalMax>0?Math.round((totalDone/totalMax)*100):0;
  const earned = fullDays.filter(Boolean).length;
  box.innerHTML = `<div class="sum-title">📅 Week ${w} Progress</div>`;
  box.appendChild(chips);
  box.innerHTML += `
    <div class="prog-label"><span>Total Progress</span><span>${totalDone}/${totalMax} (${pct}%)</span></div>
    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:linear-gradient(90deg,${col.grad})"></div></div>
    <div class="stars-row">${Array.from({length:7},(_,i)=>`<span class="s-icon ${fullDays[i]?'':'s-empty'}">⭐</span>`).join('')}</div>`;
  if (earned>=3) {
    const msgs = {7:'🏆 PERFECT WEEK! CHAMPION!', 5:`🥇 Amazing! ${earned}/7 perfect days!`, 3:`🥈 Great job! ${earned}/7 days!`};
    const msg = earned===7?msgs[7]:earned>=5?msgs[5]:msgs[3];
    const ach = document.createElement('div');
    ach.className='achieve show';
    ach.style.cssText=`background:${col.light};color:${col.dark};border-color:${col.main}`;
    ach.textContent=msg;
    box.appendChild(ach);
  }
  wrap.appendChild(box);
}

async function toggleTask(d,t) {
  const kid = state.kids[state.currentKid];
  const w = state.currentWeek[kid.id]||1;
  const val = !state.checks[kid.id][w][d][t];
  state.checks[kid.id][w][d][t] = val;
  if (val) spawnConfetti(kid.colorIdx||0);
  renderTrackerCard();
  renderWeekSummary();
  await quickSave();
}

// ── SETTINGS ──
function renderSettings() {
  const list = document.getElementById('settings-kids-list');
  list.innerHTML = '';
  state.kids.forEach((kid,i) => {
    const col = PALETTE[kid.colorIdx||0];
    const card = document.createElement('div');
    card.className = 'kid-card-settings';
    card.innerHTML = `
      <div class="kcs-top">
        <div class="kid-avatar-big" style="background:${col.light}">${kid.animal}</div>
        <div style="flex:1">
          <input class="kid-name-input" value="${kid.name}" placeholder="Child name & age"
            onchange="state.kids[${i}].name=this.value" style="border-color:${col.main}40">
        </div>
      </div>
      <div class="section-label">🎨 Color Theme</div>
      <div class="color-picker" id="cp-${i}"></div>
      <div class="section-label">🐾 Animal Avatar</div>
      <div class="animal-picker" id="ap-${i}"></div>
      <div class="section-label">✅ Daily Tasks</div>
      <div class="tasks-editor" id="te-${i}"></div>
      <button class="add-task-btn" onclick="addTask(${i})">➕ Add Task</button>
      ${state.kids.length>1?`<button class="del-kid-btn" onclick="deleteKid(${i})">🗑 Remove ${kid.name}</button>`:''}
    `;
    list.appendChild(card);
    // Colors
    const cp = card.querySelector('#cp-'+i);
    PALETTE.forEach((p,ci) => {
      const dot = document.createElement('div');
      dot.className='color-dot'+(kid.colorIdx===ci?' sel':'');
      dot.style.background=p.main;
      dot.onclick=()=>{state.kids[i].colorIdx=ci;renderSettings();};
      cp.appendChild(dot);
    });
    // Animals
    const ap = card.querySelector('#ap-'+i);
    ANIMALS.forEach(a => {
      const btn = document.createElement('button');
      btn.className='animal-btn'+(kid.animal===a?' sel':'');
      btn.textContent=a;
      btn.onclick=()=>{state.kids[i].animal=a;renderSettings();};
      ap.appendChild(btn);
    });
    // Tasks
    const te = card.querySelector('#te-'+i);
    kid.tasks.forEach((task,t) => {
      const row = document.createElement('div');
      row.className='task-edit-row';
      row.innerHTML=`
        <div class="task-icon-pick" onclick="openEmojiModal(${i},${t})">${task.icon}</div>
        <input class="task-name-inp" value="${task.name}" placeholder="Task name"
          onchange="state.kids[${i}].tasks[${t}].name=this.value">
        <button class="del-task-btn" onclick="deleteTask(${i},${t})">✕</button>`;
      te.appendChild(row);
    });
  });
}

function addKid() {
  const id='k'+Date.now();
  const used=state.kids.map(k=>k.colorIdx||0);
  let colorIdx=0;
  for(let c=0;c<PALETTE.length;c++){if(!used.includes(c)){colorIdx=c;break;}}
  state.kids.push({id,name:'Child '+(state.kids.length+1),animal:ANIMALS[Math.floor(Math.random()*ANIMALS.length)],colorIdx,tasks:JSON.parse(JSON.stringify(DEFAULT_TASKS))});
  fixState();
  renderSettings();
}
window.addKid=addKid;

function deleteKid(i) {
  if(state.kids.length<=1)return;
  if(!confirm('Remove '+state.kids[i].name+'?'))return;
  state.kids.splice(i,1);
  if(state.currentKid>=state.kids.length)state.currentKid=0;
  renderSettings();
}
window.deleteKid=deleteKid;

function addTask(kidIdx) {
  state.kids[kidIdx].tasks.push({icon:'⭐',name:'New Task'});
  fixState();
  renderSettings();
}
window.addTask=addTask;

function deleteTask(kidIdx,taskIdx) {
  if(state.kids[kidIdx].tasks.length<=1)return;
  state.kids[kidIdx].tasks.splice(taskIdx,1);
  fixState();
  renderSettings();
}
window.deleteTask=deleteTask;

// ── EMOJI MODAL ──
function openEmojiModal(kidIdx,taskIdx) {
  emojiCallback=(emoji)=>{state.kids[kidIdx].tasks[taskIdx].icon=emoji;renderSettings();};
  const grid=document.getElementById('emoji-grid');
  grid.innerHTML='';
  ALL_EMOJIS.forEach(em=>{
    const btn=document.createElement('button');
    btn.className='e-btn';btn.textContent=em;
    btn.onclick=()=>{emojiCallback(em);closeEmojiModal();};
    grid.appendChild(btn);
  });
  document.getElementById('emoji-modal-bg').classList.add('open');
}
window.openEmojiModal=openEmojiModal;
function closeEmojiModal(){document.getElementById('emoji-modal-bg').classList.remove('open');}
window.closeEmojiModal=closeEmojiModal;

// ── CONFETTI ──
function spawnConfetti(colorIdx) {
  const col=PALETTE[colorIdx||0];
  const colors=[col.main,col.dark,'#FFD700','#fff'];
  for(let i=0;i<14;i++){
    const c=document.createElement('div');
    c.className='confetti-p';
    c.style.left=(Math.random()*100)+'vw';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration=(.7+Math.random()*.8)+'s';
    c.style.animationDelay=(Math.random()*.3)+'s';
    c.style.borderRadius=Math.random()>.5?'50%':'2px';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),1600);
  }
}
</script>
